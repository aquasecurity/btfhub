name: Build Dependencies
description: |
  Install build dependencies to test and compile btfhub artifacts
inputs:
  from:
    description: 'Install dependencies script option (pr, cron)'
    required: true
    default: 'pr'
  run-on:
    description: 'Set working-directory to run'
    required: false
    default: '.'
runs:
  using: composite
  steps:
    - name: Install ubuntu packages
      shell: bash
      working-directory: ${{ inputs.run-on }}
      env:
        FROM: ${{ inputs.from }}
        RUN_ON: ${{ inputs.run-on }}
      run: |
        set -euo pipefail
        # shellcheck source=.github/scripts/ci-helpers.sh
        source .github/scripts/ci-helpers.sh
        validate_ref "from" "${FROM}"
        validate_relative_workdir "run-on" "${RUN_ON}"
        ./tests/install-deps.sh "${FROM}"
    - name: Install pahole
      shell: bash
      working-directory: ${{ inputs.run-on }}
      run: |
        set -euo pipefail
        ./3rdparty/pahole.sh
